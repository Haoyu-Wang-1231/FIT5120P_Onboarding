spring:
  application:
    name: OnBoardingBackend
  config:
    import: classpath:/config/db.yml,classpath:/config/redis.yml
  profiles:
    active: dev

server:
  port: 8080
  servlet:
    context-path: /api

mybatis:
  mapper-locations: classpath:mappers/**/*.xml



